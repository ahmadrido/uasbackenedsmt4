<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SecureDrop Lab{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#0B0F17",
            surface: "#131A26",
            border: "#1F2937",
            accent: "#3B82F6",
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-base text-gray-200 min-h-screen flex flex-col">

{% if request.path not in ['/login', '/register'] %}
  <nav class="border-b border-border bg-surface/60 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/dashboard" class="flex items-center gap-2 font-semibold text-white">
        <span class="w-2 h-2 rounded-full bg-accent"></span>
        SecureDrop <span class="text-gray-500 font-normal">Lab</span>
      </a>

      <!-- Desktop nav -->
      <div id="nav-links" class="hidden md:flex items-center gap-1 text-sm">
        <a href="/dashboard"
          class="px-3 py-1.5 rounded-md transition {{ 'bg-accent/10 text-accent font-medium' if request.path == '/dashboard' else 'hover:bg-white/5' }}">
          Dashboard
        </a>
        <a href="/explorer"
          class="px-3 py-1.5 rounded-md transition {{ 'bg-accent/10 text-accent font-medium' if request.path == '/explorer' else 'hover:bg-white/5' }}">
          Public Explorer
        </a>
        <a href="/shared-with-me"
          class="px-3 py-1.5 rounded-md transition {{ 'bg-accent/10 text-accent font-medium' if request.path == '/shared-with-me' else 'hover:bg-white/5' }}">
          Shared with me
        </a>
        <span id="nav-username" class="px-3 text-gray-500"></span>
        <button id="logout-btn" class="px-3 py-1.5 rounded-md bg-red-500/10 text-red-400 hover:bg-red-500/20 transition">
          Logout
        </button>
      </div>

      <!-- Hamburger button (mobile only) -->
      <button id="menu-toggle" class="md:hidden p-2 rounded-md hover:bg-white/5 transition" aria-label="Toggle menu">
        <svg id="icon-open" class="w-6 h-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <svg id="icon-close" class="w-6 h-6 text-gray-300 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Mobile dropdown nav -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-border bg-surface px-4 py-3 space-y-1 text-sm">
      <a href="/dashboard"
        class="block px-3 py-2 rounded-md transition {{ 'bg-accent/10 text-accent font-medium' if request.path == '/dashboard' else 'hover:bg-white/5' }}">
        Dashboard
      </a>
      <a href="/explorer"
        class="block px-3 py-2 rounded-md transition {{ 'bg-accent/10 text-accent font-medium' if request.path == '/explorer' else 'hover:bg-white/5' }}">
        Public Explorer
      </a>
      <a href="/shared-with-me"
        class="block px-3 py-2 rounded-md transition {{ 'bg-accent/10 text-accent font-medium' if request.path == '/shared-with-me' else 'hover:bg-white/5' }}">
        Shared with me
      </a>
      <div class="border-t border-border my-2"></div>
      <span id="nav-username-mobile" class="block px-3 py-1 text-gray-500"></span>
      <button id="logout-btn-mobile" class="w-full text-left px-3 py-2 rounded-md bg-red-500/10 text-red-400 hover:bg-red-500/20 transition">
        Logout
      </button>
    </div>
  </nav>
{% endif %}

  <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script>
    // --- Hamburger toggle ---
    const menuToggle = document.getElementById("menu-toggle");
    const mobileMenu = document.getElementById("mobile-menu");
    const iconOpen = document.getElementById("icon-open");
    const iconClose = document.getElementById("icon-close");

    menuToggle?.addEventListener("click", () => {
      const isHidden = mobileMenu.classList.contains("hidden");
      mobileMenu.classList.toggle("hidden", !isHidden);
      iconOpen.classList.toggle("hidden", isHidden);
      iconClose.classList.toggle("hidden", !isHidden);
    });

    // Tutup mobile menu otomatis saat resize ke desktop
    window.addEventListener("resize", () => {
      if (window.innerWidth >= 768 && !mobileMenu.classList.contains("hidden")) {
        mobileMenu.classList.add("hidden");
        iconOpen.classList.remove("hidden");
        iconClose.classList.add("hidden");
      }
    });

    // --- Logout (desktop & mobile) ---
    async function handleLogout() {
      try {
        await apiFetch("/auth/logout", { method: "POST" });
      } finally {
        window.location.href = "/login";
      }
    }
    document.getElementById("logout-btn")?.addEventListener("click", handleLogout);
    document.getElementById("logout-btn-mobile")?.addEventListener("click", handleLogout);

    // --- Tampilkan username di navbar jika sudah login ---
    (async () => {
      try {
        const data = await apiFetch("/auth/me");
        const label = `@${data.user.username}`;
        const desktopEl = document.getElementById("nav-username");
        const mobileEl = document.getElementById("nav-username-mobile");
        if (desktopEl) desktopEl.textContent = label;
        if (mobileEl) mobileEl.textContent = label;
      } catch (_) {
        // biarkan, halaman publik/login tidak butuh ini
      }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
