{% extends "base.html" %}
{% block title %}Public Explorer — SecureDrop{% endblock %}

{% block content %}
<h2 class="font-semibold text-white mb-1">Public Explorer</h2>
<p class="text-sm text-gray-500 mb-4">File yang dibagikan secara publik oleh seluruh user terdaftar.</p>

<div id="filter-bar-container"></div>

<div id="public-list" class="grid sm:grid-cols-2 gap-4">
  <div class="skeleton h-24 rounded-xl"></div>
  <div class="skeleton h-24 rounded-xl"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let publicFilesData = [];

  document.getElementById("filter-bar-container").innerHTML =
    buildFilterBarHtml("explorer-search", "explorer-filter", {
      searchPlaceholder: "Cari judul, deskripsi, atau nama file...",
      filterAllLabel: "Semua pengunggah",
    });

  document.getElementById("explorer-search").addEventListener("input", renderFilteredPublicFiles);
  document.getElementById("explorer-filter").addEventListener("change", renderFilteredPublicFiles);

  function publicCard(f) {
    return `
      <div class="bg-surface border border-border rounded-xl p-4">
        <div class="flex items-center gap-3 mb-2">
          ${fileThumbHtml(f, "w-12 h-12")}
          <div class="min-w-0">
            <p class="text-sm font-medium text-white truncate">${f.title}</p>
            <p class="text-[11px] text-gray-600 truncate">oleh @${f.owner?.username || "-"} · ${formatDate(f.created_at)}</p>
          </div>
        </div>
        <p class="text-xs text-gray-500 line-clamp-2">${f.description || "Tanpa deskripsi"}</p>
        <div class="flex justify-end mt-3">
          <a href="/api/files/${f.id}/download" class="text-xs px-3 py-1.5 rounded-lg bg-accent/10 text-accent hover:bg-accent/20 transition">Unduh</a>
        </div>
      </div>`;
  }

  function renderFilteredPublicFiles() {
    const query = document.getElementById("explorer-search").value;
    const filterUsername = document.getElementById("explorer-filter").value;

    const filtered = publicFilesData.filter((f) => {
      const matchesText = textMatches(query, f.title, f.description, f.original_filename);
      const matchesUser = !filterUsername || f.owner?.username === filterUsername;
      return matchesText && matchesUser;
    });

    const container = document.getElementById("public-list");
    container.innerHTML = filtered.length
      ? filtered.map(publicCard).join("")
      : `<p class="text-sm text-gray-600 col-span-2">Tidak ada file yang cocok.</p>`;
  }

  async function loadPublicFiles() {
    const container = document.getElementById("public-list");
    try {
      const data = await apiFetch("/files/public");
      publicFilesData = data.files;

      const usernames = publicFilesData.map((f) => f.owner?.username);
      populateUsernameFilter("explorer-filter", usernames, "Semua pengunggah");

      renderFilteredPublicFiles();
    } catch (err) {
      container.innerHTML = `<p class="text-sm text-red-400 col-span-2">${err.message}</p>`;
    }
  }

  (async () => {
    const user = await requireAuth();
    if (!user) return;
    loadPublicFiles();
  })();
</script>
{% endblock %}
