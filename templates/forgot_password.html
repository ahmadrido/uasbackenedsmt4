{% extends "base.html" %}
{% block title %}Lupa Password — SecureDrop{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-10">
  <div class="bg-surface border border-border rounded-2xl p-8 shadow-xl">
    <h1 class="text-xl font-semibold text-white mb-1">Lupa Password</h1>
    <p class="text-sm text-gray-500 mb-6">
      Masukkan email yang terdaftar. Kami akan mengirimkan link untuk membuat password baru.
    </p>

    <form id="forgot-form" class="space-y-4">
      <div>
        <label class="block text-xs text-gray-400 mb-1">Email Terdaftar</label>
        <input type="email" id="email" required
          class="w-full bg-base border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent" />
      </div>
      <button type="submit" id="submit-btn"
        class="w-full bg-accent hover:bg-blue-600 transition text-white text-sm font-medium py-2.5 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed">
        Kirim Link Reset
      </button>
      <div id="alert-box" class="hidden"></div>
    </form>

    <p class="text-sm text-gray-500 mt-6 text-center">
      Ingat password? <a href="/login" class="text-accent hover:underline">Kembali ke Login</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const form = document.getElementById("forgot-form");
  const submitBtn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = "Mengirim...";

    try {
      const data = await apiFetch("/auth/forgot-password", {
        method: "POST",
        body: JSON.stringify({ email }),
      });
      showAlert("alert-box", data.message, false);
      form.reset();
    } catch (err) {
      showAlert("alert-box", err.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Kirim Link Reset";
    }
  });
</script>
{% endblock %}
