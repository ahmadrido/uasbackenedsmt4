{% extends "base.html" %}
{% block title %}Halaman Tidak Ditemukan — SecureDrop{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="text-center max-w-md mx-auto px-4">

    <div class="relative inline-block mb-6">
      <p class="text-8xl sm:text-9xl font-bold text-white/5 select-none leading-none">404</p>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-16 h-16 rounded-2xl bg-accent/10 border border-accent/20 flex items-center justify-center">
          <svg class="w-8 h-8 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
      </div>
    </div>

    <h1 class="text-xl font-semibold text-white mb-2">Halaman Tidak Ditemukan</h1>
    <p class="text-sm text-gray-500 mb-8">
      Halaman yang Anda cari tidak ada, sudah dipindahkan, atau URL-nya salah ketik.
    </p>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <button onclick="history.back()"
        class="px-5 py-2.5 rounded-lg bg-white/5 hover:bg-white/10 transition text-sm text-gray-300 font-medium">
        Kembali
      </button>
      <a href="/dashboard"
        class="px-5 py-2.5 rounded-lg bg-accent hover:bg-blue-600 transition text-sm text-white font-medium">
        Ke Dashboard
      </a>
    </div>

  </div>
</div>
{% endblock %}
